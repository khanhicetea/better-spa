# fly.toml app configuration file generated for shell-spa on 2025-12-15T17:20:35+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'shell-spa'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

# Environment variables for all processes
[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"

# Process groups - Define different processes to run
[processes]
  app = "node .output/server/index.mjs"       # Web server
  worker = "node .output/worker/worker.js"    # Background job worker

# HTTP service configuration (server only)
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']  # Only server process handles HTTP

# VM configuration for server (with auto-scaling)
[[vm]]
  size = 'shared-cpu-1x'
  processes = ['app']

# VM configuration for worker (always running for job processing)
[[vm]]
  size = 'shared-cpu-1x'
  processes = ['worker']
